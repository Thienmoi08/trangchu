<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bro Thiện English Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .back { transform: rotateY(180deg); backface-visibility: hidden; }
        .front { backface-visibility: hidden; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- TRANG CHỦ -->
    <div id="unit-selection" class="max-w-md mx-auto p-6 mt-10">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Chào Bro Thiện! Chọn Unit học đi:</h1>
        <button onclick="loadUnit('unit3')" class="w-full bg-blue-600 text-white p-4 rounded-xl shadow-lg hover:bg-blue-700 transition">Unit 3: Fun and Games</button>
    </div>

    <!-- GIAO DIỆN HỌC -->
    <div id="learning-app" class="hidden max-w-md mx-auto p-4 mt-5">
        <h2 id="unit-title" class="text-xl font-bold text-center mb-4"></h2>
        
        <!-- Flashcard -->
        <div class="perspective h-48 mb-6" onclick="flipCard()">
            <div id="card-inner" class="card-inner relative w-full h-full text-center">
                <div class="front absolute w-full h-full bg-white rounded-2xl shadow-md flex items-center justify-center p-4 text-2xl font-bold">
                    <span id="word-display">Word</span>
                </div>
                <div class="back absolute w-full h-full bg-blue-500 text-white rounded-2xl shadow-md flex items-center justify-center p-4 text-xl">
                    <span id="meaning-display">Meaning</span>
                </div>
            </div>
        </div>

        <!-- Quiz Area -->
        <div id="options-grid" class="grid grid-cols-1 gap-3"></div>
        
        <div class="mt-6 flex gap-2">
            <button onclick="nextWord()" class="flex-1 bg-gray-800 text-white p-3 rounded-lg">Tiếp theo</button>
            <button onclick="startVoiceCheck()" class="flex-1 bg-green-600 text-white p-3 rounded-lg">🎙️ Check Phát Âm</button>
        </div>
        
        <button onclick="location.reload()" class="w-full mt-4 text-gray-500 underline">Về trang chọn Unit</button>
    </div>

    <script src="main.js"></script>
    <script>
        function loadUnit(unitName) {
            const script = document.createElement('script');
            script.src = `data/${unitName}.js`;
            script.onload = () => {
                document.getElementById('unit-selection').classList.add('hidden');
                document.getElementById('learning-app').classList.remove('hidden');
                
                // Khởi tạo từ biến toàn cục trong file JS load được
                const data = window[`${unitName}Data`];
                document.getElementById('unit-title').innerText = data.title;
                showQuestion(data);
            };
            document.head.appendChild(script);
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('flipped');
        }

        // Bro sẽ viết tiếp logic hiển thị trong main.js dựa trên các ID này
    </script>
</body>
</html>
