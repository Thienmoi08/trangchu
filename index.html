<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Hub - Bro Thiện</title>
    <style>
        /* Gradient Animation Tốc Độ Cao */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 5s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        /* Liquid Glass Style */
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.02); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- TRANG CHỌN UNIT -->
    <div id="unit-selection" class="glass">
        <h1 class="text-2xl font-bold mb-6">Hello Bro Thiện</h1>
        <button onclick="loadUnit('unit3')">🚀 Unit 3: Fun and Games</button>
    </div>

    <!-- GIAO DIỆN HỌC -->
    <div id="learning-app" class="glass hidden">
        <h2 id="unit-title" class="text-xl font-semibold mb-4"></h2>
        
        <div id="flashcard" class="h-32 flex items-center justify-center bg-white/20 rounded-xl mb-6 cursor-pointer">
            <p id="word-display" class="text-2xl font-bold">Word</p>
        </div>

        <div id="options-grid" class="grid grid-cols-2 gap-3"></div>
        
        <button onclick="checkSpeaking()" class="bg-green-500/30 mt-4">🎙️ Check Phát Âm</button>
        <button onclick="location.reload()" class="text-white/70 text-sm underline mt-4">Quay lại chọn Unit</button>
    </div>

    <script src="main.js"></script>
    <script>
        function loadUnit(unitName) {
            const script = document.createElement('script');
            script.src = `data/${unitName}.js`;
            script.onload = () => {
                document.getElementById('unit-selection').classList.add('hidden');
                document.getElementById('learning-app').classList.remove('hidden');
                
                // Khởi tạo (Bro nhớ viết hàm initUnit trong main.js)
                const data = window[`${unitName}Data`];
                document.getElementById('unit-title').innerText = data.title;
                document.getElementById('word-display').innerText = data.topic_vocabulary[0].word;
            };
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
