<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvoWars Retro-Modern Edition</title>
    <style>
        /* PHONG CÁCH RỐI RẮM CỔ ĐIỂN LAI HIỆN ĐẠI (GIAO DIỆN PHÓNG TO) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #07070c; color: #00ffcc; }
        
        #game-container { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; background: radial-gradient(circle, #101226 0%, #05060f 100%); }

        /* MENU CHÍNH TO HƠN */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .panel { background: rgba(10, 12, 26, 0.95); border: 4px double #00ffcc; box-shadow: 0 0 30px #00ffcc, inset 0 0 15px #ff0055; padding: 40px; width: 90%; max-width: 1000px; max-height: 90vh; overflow-y: auto; text-shadow: 0 0 5px #00ffcc; }
        h1 { text-align: center; font-size: 3.5rem; color: #ff0055; margin-bottom: 30px; text-transform: uppercase; border-bottom: 3px dashed #00ffcc; padding-bottom: 15px; letter-spacing: 2px; }
        
        .flex-container { display: flex; gap: 30px; }
        .main-menu { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .shop-menu { flex: 1.4; border-left: 3px dashed #ff0055; padding-left: 30px; }

        .btn { background: #1a1d36; border: 3px solid #00ffcc; color: #00ffcc; padding: 18px; font-size: 1.4rem; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: all 0.2s; text-align: center; }
        .btn:hover { background: #00ffcc; color: #07070c; box-shadow: 0 0 20px #00ffcc; }
        .btn-play { background: #ff0055; color: #fff; border-color: #ff0055; font-size: 2rem; letter-spacing: 1px; }
        .btn-play:hover { background: #fff; color: #ff0055; box-shadow: 0 0 35px #ff0055; }

        /* THÔNG TIN VÀNG / NÂNG CẤP TO RÕ */
        .currency-status { font-size: 1.8rem; color: #ffff00; text-align: center; margin-bottom: 25px; padding: 10px; border: 2px dotted #ffff00; font-weight: bold; }
        h3 { font-size: 1.6rem; margin-bottom: 12px; }
        .upgrade-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 12px; border: 2px solid #333; font-size: 1.1rem; }
        
        /* DANH SÁCH SHOP SKIN TO */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-height: 350px; overflow-y: auto; margin-top: 15px; padding-right: 5px; }
        .shop-item { border: 2px solid #00ffcc; padding: 15px; text-align: center; background: #0d0f21; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .shop-item.owned { border-color: #ffff00; color: #ffff00; }
        .shop-item.equipped { background: #ff0055; border-color: #fff; color: #fff; box-shadow: 0 0 10px #ff0055; }

        /* HUD KHI ĐANG CHƠI PHÓNG TO */
        #hud { position: absolute; top: 15px; left: 15px; z-index: 5; pointer-events: none; display: none; width: calc(100% - 30px); }
        .hud-text { font-size: 1.6rem; margin-bottom: 8px; background: rgba(0,0,0,0.6); padding: 8px 15px; display: inline-block; border-left: 4px solid #00ffcc; font-weight: bold; }
        #leaderboard { position: absolute; top: 15px; right: 15px; background: rgba(10, 12, 26, 0.9); border: 2px solid #00ffcc; padding: 15px; font-size: 1.2rem; min-width: 250px; box-shadow: 0 0 15px rgba(0,255,204,0.3); }
        #leaderboard h3 { color: #ff0055; border-bottom: 2px solid #00ffcc; margin-bottom: 8px; padding-bottom: 5px; font-size: 1.3rem; }
        .lb-item { margin-bottom: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="hud-text">CẤP ĐỘ: <span id="hud-level">1</span></div><br>
        <div class="hud-text">NĂNG LƯỢNG: <span id="hud-exp">0</span></div>
        <div id="leaderboard">
            <h3>BẢNG XẾP HẠNG</h3>
            <div id="leaderboard-list"></div>
        </div>
    </div>

    <div id="menu-layer" class="ui-layer">
        <div class="panel">
            <h1>EVOWARS: RETRO-MODERN</h1>
            
            <div class="currency-status">TÀI SẢN: <span id="gold-count">0</span> 💰 VÀNG</div>

            <div class="flex-container">
                <div class="main-menu">
                    <button class="btn btn-play" onclick="startGame()">VÀO TRẬN (ENTER)</button>
                    
                    <div style="margin-top: 15px;">
                        <h3 style="color:#ff0055;">NÂNG CẤP CHỈ SỐ</h3>
                        <div class="upgrade-row">
                            <span>Tốc độ (+1%/cấp, Max 20%):</span>
                            <button class="btn" style="padding:8px 15px; font-size:1.1rem;" onclick="buyUpgrade('speed')">MUA (<span id="cost-speed">100</span>)</button>
                        </div>
                        <div class="upgrade-row">
                            <span>Hấp thụ thức ăn (+1%, Max 50%):</span>
                            <button class="btn" style="padding:8px 15px; font-size:1.1rem;" onclick="buyUpgrade('food')">MUA (<span id="cost-food">100</span>)</button>
                        </div>
                    </div>
                </div>

                <div class="shop-menu">
                    <h3 style="color:#00ffcc;">CỬA HÀNG SKIN & VŨ KHÍ</h3>
                    <div class="shop-grid" id="shop-items-container">
                        <div class="shop-item equipped" id="item-1" onclick="selectSkin(1)">
                            <p>Mặc định (Cấp 1)</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let userData = JSON.parse(localStorage.getItem('evowars_retro_data')) || {
        gold: 0,
        upgrades: { speed: 0, food: 0 },
        ownedSkins: [1],
        equippedSkin: 1
    };

    const MAX_AVAILABLE_ASSETS = 10; 
    const loadedImages = { nhanvat: {}, vukhi: {} };
    const loadedSounds = {};

    function saveUserData() {
        localStorage.setItem('evowars_retro_data', JSON.stringify(userData));
        document.getElementById('gold-count').innerText = userData.gold;
    }

    function preloadAssets() {
        for (let i = 2; i <= MAX_AVAILABLE_ASSETS; i++) {
            let imgNv = new Image(); imgNv.src = `nhanvat/${i}.png`;
            imgNv.onload = () => { loadedImages.nhanvat[i] = imgNv; };
            let imgVk = new Image(); imgVk.src = `vukhi/${i}.png`;
            imgVk.onload = () => { loadedImages.vukhi[i] = imgVk; };
            let snd = new Audio(`amthanh/${i}.mp3`); snd.volume = 0.6;
            loadedSounds[i] = snd;
        }
    }

    function getSkinPrice(id) { return Math.floor(Math.pow(id, 2.5) * 150); }
    function getUpgradePrice(type, currentLvl) { return Math.floor((currentLvl + 1) * 200 * 1.5); }

    function renderShop() {
        const container = document.getElementById('shop-items-container');
        container.innerHTML = `<div class="shop-item ${userData.equippedSkin == 1 ? 'equipped' : 'owned'}" onclick="selectSkin(1)"><p>Mặc định (Cấp 1)</p></div>`;
        
        for (let i = 2; i <= MAX_AVAILABLE_ASSETS; i++) {
            const price = getSkinPrice(i);
            const isOwned = userData.ownedSkins.includes(i);
            const isEquipped = userData.equippedSkin == i;
            let statusText = isEquipped ? "Đang dùng" : (isOwned ? "Sở hữu" : `${price} 💰`);
            let className = `shop-item ${isEquipped ? 'equipped' : (isOwned ? 'owned' : '')}`;

            container.innerHTML += `
                <div class="${className}" onclick="selectSkin(${i})">
                    <p>Bộ Cấp ${i}</p>
                    <span style="font-size:0.85rem; font-weight:bold; display:block; margin-top:5px;">${statusText}</span>
                </div>
            `;
        }
        document.getElementById('cost-speed').innerText = getUpgradePrice('speed', userData.upgrades.speed);
        document.getElementById('cost-food').innerText = getUpgradePrice('food', userData.upgrades.food);
    }

    function selectSkin(id) {
        if (!userData.ownedSkins.includes(id)) {
            let price = getSkinPrice(id);
            if (userData.gold >= price) {
                userData.gold -= price;
                userData.ownedSkins.push(id);
                userData.equippedSkin = id;
            } else { alert("Không đủ vàng bro ơi!"); return; }
        } else { userData.equippedSkin = id; }
        saveUserData(); renderShop();
    }

    function buyUpgrade(type) {
        let currentLvl = userData.upgrades[type];
        if (type === 'speed' && currentLvl >= 20) return alert("Max tốc rồi bro!");
        if (type === 'food' && currentLvl >= 50) return alert("Max rồi bro!");

        let price = getUpgradePrice(type, currentLvl);
        if (userData.gold >= price) {
            userData.gold -= price;
            userData.upgrades[type]++;
            saveUserData(); renderShop();
        } else { alert("Thiếu vàng rồi bro!"); }
    }

    // --- GAME ENGINE LOGIC ---
    let gameActive = false;
    let worldSize = 4000;
    let player; let entities = []; let foods = [];
    let mouse = { x: 0, y: 0, isDown: false, rightDown: false };

    class Entity {
        constructor(x, y, isBot = true, name = "Bot Pro") {
            this.x = x; this.y = y; this.isBot = isBot; this.name = name;
            this.level = isBot ? Math.floor(Math.random() * 4) + 1 : userData.equippedSkin;
            this.exp = 0;
            this.radius = 35 + this.level * 4; // Tăng nhẹ kích thước nhân vật
            this.baseSpeed = 3.8 - (this.level * 0.08);
            this.speed = this.baseSpeed;
            this.angle = 0;
            this.boost = 1.0;
            
            // TIMING TẤN CÔNG (600ms cả quá trình, 300ms vung ra, 300ms thu về)
            this.isAttacking = false;
            this.attackTime = 0; 
            this.attackDuration = 600; // 600 miligiây
            this.currentSwingAngle = 0; // Góc quay thực tế của vũ khí khi vụt

            this.weaponType = (this.level % 2 === 0) ? 2 : 1; 
            this.weaponLength = 45 + this.level * 16;
            this.target = null; this.botActionTimer = 0;
        }

        update(deltaTime) {
            let maxBoostBonus = (0.5 - (this.level * 0.02)); 
            if (maxBoostBonus < 0.2) maxBoostBonus = 0.2;
            
            if (!this.isBot && mouse.rightDown && this.exp > 2) {
                this.boost = 1 + maxBoostBonus; this.exp -= 0.15;
            } else { this.boost = 1.0; }

            let upgradeSpeedBonus = !this.isBot ? (userData.upgrades.speed * 0.01) : 0;
            this.speed = (this.baseSpeed * this.boost) * (1 + upgradeSpeedBonus);

            if (this.isBot) { this.handleBotAI(); } 
            else {
                let dx = mouse.x - (canvas.width / 2);
                let dy = mouse.y - (canvas.height / 2);
                if (Math.hypot(dx, dy) > 10) {
                    this.angle = Math.atan2(dy, dx);
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                }
            }

            this.x = Math.max(this.radius, Math.min(worldSize - this.radius, this.x));
            this.y = Math.max(this.radius, Math.min(worldSize - this.radius, this.y));

            // LOGIC XỬ LÝ VÙNG KIẾM THEO THỜI GIAN THỰC (CHẬM & CHUẨN 600MS)
            if (this.isAttacking) {
                this.attackTime += deltaTime;
                
                if (this.attackTime <= 300) {
                    // 300ms đầu: Từ vị trí nghỉ tiến về sát kim 12h (Góc -Math.PI/2 tương đối là 0 rad hướng vung)
                    // Chúng ta tính toán nội suy mượt mà từ 0 đến 1
                    let progress = this.attackTime / 300;
                    this.currentSwingAngle = -progress * (Math.PI * 0.62); // Vụt mạnh lên hướng trước mặt
                } else if (this.attackTime <= 600) {
                    // 300ms sau: Thu kiếm từ kim 12h lùi về vị trí nghỉ cũ
                    let progress = (this.attackTime - 300) / 300;
                    this.currentSwingAngle = -(1 - progress) * (Math.PI * 0.62);
                } else {
                    // Kết thúc hoàn toàn chu kỳ 600ms -> Trở về trạng thái tĩnh hoàn toàn mới được vụt tiếp
                    this.isAttacking = false;
                    this.attackTime = 0;
                    this.currentSwingAngle = 0;
                }
            }
        }

        handleBotAI() {
            this.botActionTimer--;
            if (!this.target || this.botActionTimer <= 0) {
                let nearest = null; let minDist = 700;
                entities.forEach(e => {
                    if (e === this) return;
                    let d = Math.hypot(e.x - this.x, e.y - this.y);
                    if (d < minDist) { minDist = d; nearest = e; }
                });
                if (nearest) { this.target = nearest; this.botActionTimer = 40; } 
                else {
                    let nearFood = foods[Math.floor(Math.random() * foods.length)];
                    if (nearFood) this.target = nearFood; this.botActionTimer = 30;
                }
            }
            if (this.target) {
                let tx = this.target.x - this.x; let ty = this.target.y - this.y;
                this.angle = Math.atan2(ty, tx);
                let dist = Math.hypot(tx, ty);
                if (this.target instanceof Entity && dist < this.weaponLength + this.target.radius + 15) {
                    this.attack(); // Bot kích hoạt tấn công nếu hồi chiêu xong
                }
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
            }
        }

        attack() {
            if (this.isAttacking) return; // KHÔNG ĐƯỢC VỤT TIẾP khi đang trong chu kỳ 600ms
            this.isAttacking = true;
            this.attackTime = 0;
            if (!this.isBot && loadedSounds[this.level]) {
                try { loadedSounds[this.level].cloneNode(true).play(); } catch(e){}
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            // CẮT HÌNH TRÒN TỪ KHUNG ẢNH VUÔNG
            ctx.save();
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.clip();
            let assetId = this.level;
            if (assetId > 1 && loadedImages.nhanvat[assetId]) {
                ctx.drawImage(loadedImages.nhanvat[assetId], -this.radius, -this.radius, this.radius*2, this.radius*2);
            } else {
                ctx.fillStyle = this.isBot ? '#ff0055' : '#00ffcc';
                ctx.fillRect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(this.radius/3, -this.radius/3, 6, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();

            ctx.strokeStyle = this.isBot ? 'rgba(255,0,85,0.8)' : 'rgba(0,255,204,0.8)';
            ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.stroke();

            // VẼ VŨ KHÍ QUAY ĐỘNG THEO GÓC NỘI SUY (SWING ANGLE)
            const drawSingleWeapon = (baseAngleOffset) => {
                ctx.save();
                ctx.rotate(baseAngleOffset + this.currentSwingAngle);
                let gap = 5;
                if (loadedImages.vukhi[assetId] && assetId > 1) {
                    ctx.drawImage(loadedImages.vukhi[assetId], this.radius + gap, -7, this.weaponLength, 14);
                } else {
                    ctx.fillStyle = '#ffff00'; ctx.fillRect(this.radius + gap, -4, this.weaponLength, 8);
                }
                ctx.restore();
            };

            // Hướng 8 giờ (Vũ khí 1 tay)
            if (this.weaponType === 1 || this.weaponType === 2) drawSingleWeapon(Math.PI * 0.65);
            // Hướng 4 giờ (Vũ khí bổ trợ 2 tay)
            if (this.weaponType === 2) drawSingleWeapon(-Math.PI * 0.65);

            ctx.restore();

            // Tên hiển thị to, rõ nét hơn
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 15px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(`${this.name} [Lv.${this.level}]`, this.x, this.y - this.radius - 12);
        }

        // TÍNH TOÁN ĐẦU VŨ KHÍ CHÍNH XÁC ĐỂ CHECK VA CHẠM KHHI CHÉM
        getWeaponTipPositions() {
            let tips = [];
            let gap = 5;
            let reach = this.radius + gap + this.weaponLength;

            const addTip = (baseAngleOffset) => {
                let finalAngle = this.angle + baseAngleOffset + this.currentSwingAngle;
                tips.push({ x: this.x + Math.cos(finalAngle) * reach, y: this.y + Math.sin(finalAngle) * reach });
            };

            if (this.weaponType === 1 || this.weaponType === 2) addTip(Math.PI * 0.65);
            if (this.weaponType === 2) addTip(-Math.PI * 0.65);
            return tips;
        }

        addExp(amount) {
            let foodUpgradeBonus = !this.isBot ? (userData.upgrades.food * 0.01) : 0;
            this.exp += amount * (1 + foodUpgradeBonus);
            if (this.exp >= this.level * 50) {
                this.exp = 0;
                if (this.level < MAX_AVAILABLE_ASSETS) {
                    this.level++;
                    this.radius = 35 + this.level * 4;
                    this.weaponLength = 45 + this.level * 16;
                    this.weaponType = (this.level % 2 === 0) ? 2 : 1;
                }
            }
        }
    }

    function spawnFood(count = 1) {
        for (let i = 0; i < count; i++) {
            foods.push({
                x: Math.random() * worldSize, y: Math.random() * worldSize,
                radius: Math.random() * 4 + 4,
                color: `hsl(${Math.random() * 360}, 100%, 60%)`
            });
        }
    }

    function startGame() {
        document.getElementById('menu-layer').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        player = new Entity(worldSize / 2, worldSize / 2, false, "Bro Thiện 😎");
        entities = [player]; foods = [];
        
        const botNames = ["Thập Tam Muội", "Sơn Tùng MTP", "Luffy G5", "Sát Thủ Đêm", "Bá Chủ Thách Đấu", "Sử Hộ Vương"];
        for(let i=0; i<30; i++) {
            entities.push(new Entity(Math.random() * worldSize, Math.random() * worldSize, true, botNames[Math.floor(Math.random()*botNames.length)] + " " + Math.floor(Math.random()*99)));
        }
        spawnFood(400); lastTime = performance.now(); gameActive = true;
    }

    function gameOver(rank) {
        gameActive = false;
        document.getElementById('menu-layer').style.display = 'flex';
        document.getElementById('hud').style.display = 'none';
        let goldReward = rank === 1 ? 450 : (rank <= 3 ? 200 : (rank <= 10 ? 70 : 20));
        userData.gold += goldReward; saveUserData(); renderShop();
        alert(`KẾT QUẢ: Hạng ${rank}! Nhận ngay ${goldReward} Vàng.`);
    }

    let lastTime = 0;
    function loop(currentTime) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let deltaTime = currentTime - lastTime;
        if(deltaTime > 100) deltaTime = 16; // Chống lag nhảy cóc thời gian khi tab ẩn
        lastTime = currentTime;

        if (gameActive) {
            document.getElementById('hud-level').innerText = player.level;
            document.getElementById('hud-exp').innerText = Math.floor(player.exp);

            entities.forEach(e => e.update(deltaTime));

            // Ăn hạt năng lượng
            entities.forEach(e => {
                for (let i = foods.length - 1; i >= 0; i--) {
                    if (Math.hypot(e.x - foods[i].x, e.y - foods[i].y) < e.radius + foods[i].radius) {
                        e.addExp(8); foods.splice(i, 1); spawnFood(1);
                    }
                }
            });

            // Xử lý chém va chạm trúng thân hình tròn
            for (let i = entities.length - 1; i >= 0; i--) {
                let attacker = entities[i];
                if (!attacker.isAttacking) continue; // Chỉ khi đang hoạt ảnh vung kiếm mới gây sát thương

                let tips = attacker.getWeaponTipPositions();
                tips.forEach(tip => {
                    for (let j = entities.length - 1; j >= 0; j--) {
                        if (i === j) continue;
                        let victim = entities[j];
                        if (Math.hypot(tip.x - victim.x, tip.y - victim.y) < victim.radius + 6) {
                            if (victim === player) {
                                entities.sort((a,b) => b.level - a.level);
                                gameOver(entities.indexOf(player) + 1); return;
                            } else {
                                attacker.addExp(victim.level * 45);
                                entities.splice(j, 1);
                                entities.push(new Entity(Math.random() * worldSize, Math.random() * worldSize, true));
                            }
                        }
                    }
                });
            }

            // CAMERA THEO PLAYER
            ctx.save();
            ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);

            ctx.strokeStyle = '#1b1e36'; ctx.lineWidth = 1;
            let gridSize = 100;
            for (let x = 0; x < worldSize; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, worldSize); ctx.stroke(); }
            for (let y = 0; y < worldSize; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(worldSize, y); ctx.stroke(); }

            ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 6; ctx.strokeRect(0, 0, worldSize, worldSize);

            foods.forEach(f => {
                ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2); ctx.fill();
            });

            entities.forEach(e => e.draw());
            ctx.restore();

            // BXH TO RÕ
            let sorted = [...entities].sort((a, b) => b.level - a.level || b.exp - a.exp);
            let lbList = document.getElementById('leaderboard-list'); lbList.innerHTML = "";
            sorted.slice(0, 5).forEach((e, idx) => {
                let color = e === player ? '#00ffcc' : '#fff';
                lbList.innerHTML += `<div class="lb-item" style="color: ${color}">${idx+1}. ${e.name} (Cấp ${e.level})</div>`;
            });
        }
        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mousedown', (e) => {
        if (e.button === 0 && gameActive) player.attack(); 
        if (e.button === 2) mouse.rightDown = true;
    });
    window.addEventListener('mouseup', (e) => { if (e.button === 2) mouse.rightDown = false; });
    window.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !gameActive) startGame(); });

    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    preloadAssets(); saveUserData(); renderShop();
    requestAnimationFrame(loop);
</script>
</body>
</html>
